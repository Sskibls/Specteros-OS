syntax = "proto3";

package specteros.v1;

service SpecterosShardService {
  rpc CreateShard(CreateShardRequest) returns (CreateShardResponse);
  rpc StartShard(StartShardRequest) returns (StartShardResponse);
  rpc StopShard(StopShardRequest) returns (StopShardResponse);
  rpc SnapshotShard(SnapshotShardRequest) returns (SnapshotShardResponse);
  rpc GetShardState(GetShardStateRequest) returns (GetShardStateResponse);
}

message CreateShardRequest {
  string shard_name = 1;
}

message CreateShardResponse {
  bool created = 1;
}

message StartShardRequest {
  string shard_name = 1;
}

message StartShardResponse {
  bool started = 1;
}

message StopShardRequest {
  string shard_name = 1;
}

message StopShardResponse {
  bool stopped = 1;
}

message SnapshotShardRequest {
  string shard_name = 1;
}

message SnapshotShardResponse {
  bool snapshot_created = 1;
}

message GetShardStateRequest {
  string shard_name = 1;
}

message GetShardStateResponse {
  string state = 1;
}

