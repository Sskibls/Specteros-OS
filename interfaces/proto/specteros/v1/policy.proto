syntax = "proto3";

package specteros.v1;

service SpecterosPolicyService {
  rpc EvaluateCapability(EvaluateCapabilityRequest) returns (EvaluateCapabilityResponse);
  rpc RevokeCapability(RevokeCapabilityRequest) returns (RevokeCapabilityResponse);
  rpc ListEffectivePolicy(ListEffectivePolicyRequest) returns (ListEffectivePolicyResponse);
}

message EvaluateCapabilityRequest {
  string subject = 1;
  string shard = 2;
  string resource = 3;
  string action = 4;
  uint64 duration_seconds = 5;
}

message EvaluateCapabilityResponse {
  bool allowed = 1;
  string token = 2;
  string reason = 3;
}

message RevokeCapabilityRequest {
  string token = 1;
}

message RevokeCapabilityResponse {
  bool revoked = 1;
}

message ListEffectivePolicyRequest {
  string shard = 1;
}

message PolicyRule {
  string id = 1;
  string description = 2;
}

message ListEffectivePolicyResponse {
  repeated PolicyRule rules = 1;
}

