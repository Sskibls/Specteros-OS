syntax = "proto3";

package specteros.v1;

service SpecterosUpdateService {
  rpc CheckChannel(CheckChannelRequest) returns (CheckChannelResponse);
  rpc StageUpdate(StageUpdateRequest) returns (StageUpdateResponse);
  rpc CommitUpdate(CommitUpdateRequest) returns (CommitUpdateResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
}

message CheckChannelRequest {
  string channel = 1;
}

message CheckChannelResponse {
  bool update_available = 1;
  string bundle_id = 2;
}

message StageUpdateRequest {
  string bundle_id = 1;
}

message StageUpdateResponse {
  bool staged = 1;
}

message CommitUpdateRequest {
  string bundle_id = 1;
}

message CommitUpdateResponse {
  bool committed = 1;
}

message RollbackRequest {
  string reason = 1;
}

message RollbackResponse {
  bool rolled_back = 1;
}

